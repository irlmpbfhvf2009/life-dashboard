spring:
  application:
    name: life-dashboard
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Neon free tier is small; keep the pool tiny so a cold Cloud Run
      # instance does not exhaust the database connection limit.
      maximum-pool-size: 3
      minimum-idle: 0
      connection-timeout: 30000
      idle-timeout: 60000
      max-lifetime: 300000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false

server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

app:
  firebase:
    project-id: ${FIREBASE_PROJECT_ID}
    # Full JSON of the service account key, injected as an env var / secret.
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  # Optional: restrict owner-only endpoints (e.g. /api/usage) to this email.
  # Leave blank to allow any authenticated user (local dev).
  owner-email: ${OWNER_EMAIL:}
  # In-app AI (Gemini). Leave api-key blank to disable — endpoints then return a
  # friendly 503 instead of failing. Inject the key via Secret Manager in prod.
  gemini:
    api-key: ${GEMINI_API_KEY:}
    # gemini-2.0-flash free tier is 0 on the current key (429); 2.5-flash works.
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
  # GIPHY GIF search (chat GIF picker). Leave api-key blank to disable — the GIF
  # endpoints then return 503 and the picker shows a "not enabled" notice.
  # (Tenor can't be enabled on this GCP project, so GIPHY is used instead.)
  giphy:
    api-key: ${GIPHY_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.lifedashboard: INFO
